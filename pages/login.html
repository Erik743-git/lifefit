<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LifeFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <main class="login-page">
    <div class="login-box">
      <div class="login-box__logo">
        <img src="../assets/images/logo.png" alt="LifeFit Gym & Training">
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" name="usuario" placeholder="Seu usuário" required>
          <span class="form-error" id="erroUsuario"></span>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
          <span class="form-error" id="erroSenha"></span>
        </div>
        <button type="submit" class="btn btn--red">Login</button>
        <a href="#" class="login-form__forgot">Esqueci a senha</a>
        <hr class="login-divider">
        <div class="login-social">
          <button type="button" class="btn btn--white">Continuar com Google</button>
          <button type="button" class="btn btn--white">Continuar com Apple ID</button>
        </div>
      </form>
    </div>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
