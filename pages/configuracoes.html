<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações | LifeFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="has-bottom-nav">

  <div class="app-layout">
    <div class="app-main">
      <header class="header">
        <div class="header__top">
          <a href="../index.html" class="logo">
            <img src="../assets/images/logo.png" alt="LifeFit">
          </a>
          <div class="header__search">
            <input type="search" placeholder="Procurar">
            <span class="header__search-icon">🔍</span>
          </div>
          <a href="login.html" class="btn btn--red">Login</a>
          <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
            <span class="menu-toggle__bar"></span>
            <span class="menu-toggle__bar"></span>
            <span class="menu-toggle__bar"></span>
          </button>
        </div>
        <nav class="subnav" id="subnav">
          <a href="depoimentos.html" class="subnav__link">Depoimentos</a>
          <a href="infraestrutura.html" class="subnav__link">Nossa Infraestrutura</a>
          <a href="planos.html" class="subnav__link">Matricular-se</a>
        </nav>
      </header>

      <main class="page-section container">
        <h1 class="page-title">Configurações</h1>

        <div class="settings-list">
          <div class="settings-item">
            <span>Notificações</span>
            <button class="toggle toggle--on" data-toggle aria-label="Notificações">
              <span class="toggle__knob"></span>
            </button>
          </div>
          <div class="settings-item">
            <span>Acesso por biometria</span>
            <button class="toggle" data-toggle aria-label="Biometria">
              <span class="toggle__knob"></span>
            </button>
          </div>
          <div class="settings-item">
            <span>Mídia</span>
            <button class="toggle toggle--on" data-toggle aria-label="Mídia">
              <span class="toggle__knob"></span>
            </button>
          </div>
          <div class="settings-item">
            <span>Conta privada</span>
            <button class="toggle" data-toggle aria-label="Conta privada">
              <span class="toggle__knob"></span>
            </button>
          </div>
        </div>
      </main>

      <nav class="bottom-nav">
        <ul class="bottom-nav__list">
          <li><a href="perfil.html" class="bottom-nav__link"><span class="bottom-nav__icon">👤</span>Perfil</a></li>
          <li><a href="../index.html" class="bottom-nav__link"><span class="bottom-nav__icon">🏠</span>Início</a></li>
          <li><a href="configuracoes.html" class="bottom-nav__link bottom-nav__link--active"><span class="bottom-nav__icon">⚙️</span>Config</a></li>
        </ul>
      </nav>
    </div>
    <aside class="sidebar">
      <div class="sidebar__search">🔍</div>
      <a href="perfil.html" class="sidebar__avatar">👤</a>
    </aside>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/configuracoes.js"></script>
</body>
</html>
