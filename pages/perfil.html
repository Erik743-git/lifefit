<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil | LifeFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="has-bottom-nav">

  <div class="app-layout">
    <div class="app-main">
      <header class="header">
        <div class="header__top">
          <a href="../index.html" class="logo">
            <img src="../assets/images/logo.png" alt="LifeFit">
          </a>
          <div class="header__search">
            <input type="search" placeholder="Procurar">
            <span class="header__search-icon">🔍</span>
          </div>
          <a href="configuracoes.html" class="header__icon-btn" title="Configurações" aria-label="Configurações">⚙️</a>
          <a href="login.html" class="btn btn--red">Login</a>
          <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
            <span class="menu-toggle__bar"></span>
            <span class="menu-toggle__bar"></span>
            <span class="menu-toggle__bar"></span>
          </button>
        </div>
        <nav class="subnav" id="subnav">
          <a href="depoimentos.html" class="subnav__link">Depoimentos</a>
          <a href="infraestrutura.html" class="subnav__link">Infraestrutura</a>
          <a href="planos.html" class="subnav__link">Matricular-se</a>
          <a href="sobre.html" class="subnav__link">Sobre</a>
          <a href="configuracoes.html" class="subnav__link">Configurações</a>
        </nav>
      </header>

      <main class="page-section container">
        <h1 class="page-title">Perfil</h1>

        <div class="profile-card">
          <div class="profile-card__avatar">👤</div>
          <div class="profile-card__info">
            <p><strong>Nome:</strong> Erik</p>
            <p><strong>Idade:</strong> 22 anos</p>
            <p><strong>Aluno desde:</strong> 03/2024</p>
          </div>
          <div class="profile-plan">
            <span class="profile-plan__label">Plano</span>
            <p class="profile-plan__name">Plano Pro</p>
          </div>
          <button class="btn btn--red btn--block" style="margin-top:1rem" id="btnEncerrar">
            Encerrar matrícula
          </button>
        </div>
      </main>

      <nav class="bottom-nav">
        <ul class="bottom-nav__list">
          <li><a href="perfil.html" class="bottom-nav__link bottom-nav__link--active"><span class="bottom-nav__icon">👤</span>Perfil</a></li>
          <li><a href="../index.html" class="bottom-nav__link"><span class="bottom-nav__icon">🏠</span>Início</a></li>
          <li><a href="configuracoes.html" class="bottom-nav__link"><span class="bottom-nav__icon">⚙️</span>Configurações</a></li>
        </ul>
      </nav>
    </div>
    <aside class="sidebar">
      <div class="sidebar__search">🔍</div>
      <div class="sidebar__bottom">
        <a href="configuracoes.html" class="sidebar__icon-btn" title="Configurações">⚙️</a>
        <a href="perfil.html" class="sidebar__avatar">👤</a>
      </div>
    </aside>
  </div>

  <!-- Modal de confirmação -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <p class="modal__title">Tem certeza que deseja excluir a conta?</p>
      <div class="modal__actions">
        <button class="modal__btn--yes" id="btnSim">SIM</button>
        <button class="modal__btn--no" id="btnNao">NÃO</button>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/perfil.js"></script>
</body>
</html>
